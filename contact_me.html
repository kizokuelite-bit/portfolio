<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>
    <form>
        Enter you username : <input type="text" placeholder="username" class="username"><br>
        Enter your E-mail : <input type="email" placeholder="E-mail id" class="E-mail"><br>
        Select your city : <select>
            <option>Delhi</option>
            <option>Lucknow</option>
            <option>Indore</option>
            <option>Noida</option><br>
        </select>
        <br>Choose your issue : Misinformation<input type="checkbox" id="issue1"><br>
        Outdated<input type="checkbox" id="issue2"><br>
        Web not working<input type="checkbox" id="issue3"><br>
        Other issue<input type="text" placeholder="Other issue" id="issue4"><br>
        submit your request : <input type="submit" id="submit">
    </form>
    
</body>
</html>
